<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mocktests | Enrollment & Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --muted: #6b7280;
      --text: #101828;
      --accent: #0ea5a4;
      --accent-2: #ffb454;
      --border: #e5e7eb;
      --shadow: 0 20px 60px rgba(14, 17, 28, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Sora", system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(1000px 600px at 10% 0%, #e6f7f6 0%, transparent 60%),
        radial-gradient(800px 500px at 90% 10%, #fff3e0 0%, transparent 60%),
        linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: var(--text);
    }

    .page {
      width: min(980px, 92vw);
      margin: 50px auto 70px;
    }

    .panel {
      background: var(--card);
      border-radius: 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 32px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: #f9fafb;
    }

    .brand {
      display: grid;
      gap: 4px;
      flex: 1;
    }

    .banner {
      height: 56px;
      width: 180px;
      object-fit: contain;
      object-position: center;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      flex-shrink: 0;
    }

    h2 {
      font-family: "Fraunces", serif;
      font-size: 26px;
      margin-bottom: 10px;
    }

    .subtle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      gap: 18px;
    }

    .form-group { display: grid; gap: 8px; }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.2px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14, 165, 164, 0.2);
    }

    .label-icon {
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    .pill-icon {
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    .radio-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .radio-pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fafafa;
    }

    .radio-pill input {
      width: auto;
      accent-color: var(--accent);
    }

    .cta {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(120deg, var(--accent), #22c55e);
      color: white;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 24px rgba(14, 165, 164, 0.25);
    }

    .cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(14, 165, 164, 0.28);
    }

    .payment-box {
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .hidden { display: none; }
    .payment-box.hidden { display: none; }

    .price {
      font-size: 24px;
      font-weight: 700;
    }

    .qr {
      width: 180px;
      display: block;
      margin: 8px auto 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 8px;
    }

    .timer {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
      color: #d9534f;
    }

    .helper {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .panel {
        padding: 22px;
      }

      .panel-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .banner {
        width: 100%;
      }

      .radio-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<main class="page">
  <section class="panel">
    <div id="formWrap">
      <div class="panel-header">
        <img src="logo.png" alt="Mocktests logo" class="logo">
        <div class="brand">
          <h2>Enrollment Details</h2>
          <p class="subtle">Fill in your details to get the correct fee and QR payment.</p>
        </div>
        <img src="banner.png" alt="Mocktests banner" class="banner">
      </div>

      <form id="form">

        <div class="form-grid">
          <div class="form-group">
            <label><i data-lucide="user" class="label-icon"></i>Full Name</label>
            <input type="text" required placeholder="e.g. Arjun Das">
          </div>

      <div class="form-group">
        <label><i data-lucide="users" class="label-icon"></i>Gender</label>
        <div class="radio-group">
          <label class="radio-pill"><i data-lucide="male" class="pill-icon"></i><input type="radio" name="g" required> Male</label>
          <label class="radio-pill"><i data-lucide="female" class="pill-icon"></i><input type="radio" name="g"> Female</label>
        </div>
      </div>

      <div class="form-group">
        <label><i data-lucide="badge-check" class="label-icon"></i>Category</label>
        <select required>
          <option value="">Select</option>
          <option>General</option><option>OBC</option><option>MOBC</option>
          <option>SC</option><option>ST</option><option>EWS</option><option>PH</option>
          </select>
      </div>

      <div class="form-group">
        <label><i data-lucide="graduation-cap" class="label-icon"></i>Status</label>
        <div class="radio-group">
          <label class="radio-pill"><i data-lucide="book-open" class="pill-icon"></i><input type="radio" name="s" required> 12th Appearing</label>
          <label class="radio-pill"><i data-lucide="refresh-ccw" class="pill-icon"></i><input type="radio" name="s"> Dropper</label>
        </div>
      </div>

      <div class="form-group">
        <label><i data-lucide="wallet" class="label-icon"></i>Batch Fee</label>
        <select id="batch" required>
          <option value="">Select</option>
          <option value="399">₹399 — Starter Batch</option>
          <option value="499">₹499 — Prime Batch</option>
          <option value="799">₹799 — Elite Batch</option>
          <option value="999">₹999 — Pro Batch</option>
          <option value="1299">₹1299 — Achiever Batch</option>
          <option value="1499">₹1499 — Scholar Batch</option>
          <option value="1899">₹1899 — Champion Batch</option>
          <option value="2099">₹2099 — Master Batch</option>
          <option value="2399">₹2399 — Apex Batch</option>
          <option value="2799">₹2799 — Legacy Batch</option>
        </select>
      </div>
        </div>

        <button class="cta" type="submit">Proceed to Secure Payment</button>
      </form>
    </div>

    <div class="payment-box hidden" id="paymentBox">
      <h2>Complete Payment</h2>
      <p class="subtle">Scan the QR and pay the exact amount to confirm your seat.</p>
      <div class="price">Pay Amount: &#8377;<span id="price"></span></div>

      <img src="qr.png" alt="QR Code" class="qr">
      <div class="timer" id="timer">05:00</div>
      <p class="helper">Payment window closes once the timer expires.</p>
    </div>
  </section>
</main>

<script>
  const form = document.getElementById("form");
  const formWrap = document.getElementById("formWrap");
  const paymentBox = document.getElementById("paymentBox");
  const priceText = document.getElementById("price");
  const batch = document.getElementById("batch");
  const timerEl = document.getElementById("timer");

  if (window.lucide) {
    lucide.createIcons();
  }

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const price = batch.value;
    priceText.textContent = price;

    formWrap.classList.add("hidden");
    paymentBox.classList.remove("hidden");

    startTimer(300);
  });

  function startTimer(seconds) {
    let time = seconds;

    const interval = setInterval(() => {
      let min = Math.floor(time / 60);
      let sec = time % 60;

      sec = sec < 10 ? "0" + sec : sec;
      timerEl.textContent = `${min}:${sec}`;

      if (time <= 0) {
        clearInterval(interval);
        timerEl.textContent = "Time Expired";
      }

      time--;
    }, 1000);
  }
</script>

</body>
</html>
